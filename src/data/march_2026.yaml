id: march_2026
label: March 2026
asOf: '2026-03-23'
subtitle: Editorial ranking snapshot
summary: >
  A ranked snapshot of the best AI models, coding harnesses, and subscriptions
  for this period. Each section is ordered by placement.

models:
  - id: gpt-5-4
    name: GPT 5.4
    logoId: gpt-5-4
    tags: [default, coding, computer use]
    tagline: Current Best Model
    recommended: true
    description: |
      My main model right now. Best one for coding, computer use, and random tasks. Speed is good, intelligence/tool calling is the best of the best. Only real downside is it's awful at UI stuff.

  - id: opus-4-6
    name: Opus 4.6
    logoId: opus-4-6
    tags: [ui, design, coding]
    tagline: Best for Frontend
    recommended: true
    description: |
      I use this whenever I need to do basically any frontend work. It's really fast and feels great. Just isn't nearly as smart as 5.4 and makes a lot of subtle mistakes

  - id: gpt-5-4-mini
    name: GPT 5.4 Mini
    logoId: gpt-5-4-mini
    tags: [search, subagents, computer use]
    tagline: Surprisingly Capable
    recommended: true
    description: |
      A very good model for more things then you would expect. Incredible at tool calling and actually really smart. Perfect for searching, using a computer, sub agent delegations, etc.

  - id: gemini-3-1-pro
    name: Gemini 3.1 Pro
    logoId: gemini-3-1-pro
    tags: [intelligent, google model]
    tagline: Images, Videos, and Text Parsing
    description: |
      Do you want to process a video, image, or turn a giant blob of text into JSON? This is the model (or flash) for it. It's also pretty good at UI.

  - id: composer-2
    name: Composer 2.0
    logoId: composer-2
    tags: [coding]
    tagline: The Really Fast One
    description: |
      Stupid fast and quite good. Not my first choice for most things, but when I need to make a quick change it does the job. It's also way better at frontend then u would think

harnesses:
  - id: t3-code
    name: T3 Code
    logoId: t3-code
    tags: [desktop app]
    tagline: My Current Main
    recommended: true
    description: |
      Yes I'm biased, but T3 Code is really good. 90% of my work is done from here, with the only real exception being frontend stuff (typically done in Cursor, Opencode, or Pi)

  - id: cursor
    name: Cursor
    logoId: cursor
    tags: [editor, cloud agent, desktop app, cli]
    tagline: Cloud Agents + Text Editor
    recommended: true
    description: |
      Still the only AI coding editor I use. And their cloud agents are actually really good. Only one's I would ever use

  - id: pi
    name: Pi
    logoId: pi
    tags: [cli, sdk]
    tagline: Best SDK
    recommended: true
    description: |
      The CLI app is a CLI app. U've seen them before, it's fast, works well, idk what else to really say.

      The most impressive thing here is the SDK. Easily the best "AI SDK" I've used for building agents

  - id: opencode
    name: Opencode
    logoId: opencode
    tags: [cli, desktop app, sdk]
    tagline: Best TUI
    description: |
      Easily the most impressive TUI. Generally find myself using it for:

      - Claude models or open source models
      - Random one off changes on my machine

      Not my main CLI, but still worth having around

  - id: codex
    name: Codex
    logoId: codex
    tags: [cli, desktop app, cloud agent, sdk]
    tagline: Best Harness, Not the Best UI
    description: |
      The desktop app is beautiful, but the performance is rough. The CLI's one of the best and I really haven't used the cloud agent much.

  - id: claude-code
    name: Claude Code
    logoId: claude-code
    tags: [cli, sdk]
    tagline: No
    description: |
      Lol no

subs:
  - id: cursor-ultra
    name: Cursor Ultra
    logoId: cursor-ultra
    tags: [$200, every model]
    tagline: If You Can Only Get One
    recommended: true
    description: |
      Your $200 will get you ~$400-$500 a month in inference. Not nearly as insane of a subsidy as the major labs, but still worth having in my opinion. This one really shines in the harnesses & model variety you get:
      - Best cloud agents
      - Best code editor
      - Decent CLI
      If you have to pick only one sub, this is the one to get.

  - id: codex-200
    name: OpenAI Codex
    logoId: codex-200
    tags: [$200, gpt only]
    tagline: Best Value
    recommended: true
    description: |
      Insane value, your $200 will get you thousands of dollars worth of GPT a month if you push it.

      If you can afford two subs, this is the other one to get. GPT models are overall the best right now, and OpenAI is super chill about letting you use the sub in other harnesses:

      - Codex
      - T3 Code
      - Opencode
      - Pi

  - id: opencode-black
    name: OpenCode Black
    logoId: opencode-black
    tags: [$200, every model]
    tagline: Most Flexible
    recommended: true
    description: |
      This is the third sub I'd get if you can spend the money. Not as insane of a value as the other subs, but it seems like you can pretty easily get close to $1000 if you push it (although that could change).

      Best part of this one is how flexible Opencode Zen is. It's truly just an API, your sub gets you an API key. Which means it's trivial to use as the inference for agents your building, in other harnesses, etc.

  - id: claude-max
    name: Claude Max
    logoId: claude-max
    tags: [$200, claude only]
    tagline: Great Value With a Bad Harness
    description: |
      A pretty insane value for the money if you push it hard. Your $200 will get you thousands of dollars a month in inference if you push it.

      The problem is this is the most locked down sub of them all. You can really only use it in Claude Code which is currently the weakest mainline harness
